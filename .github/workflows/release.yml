name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      # Cargo publish is intentionally disabled: .releaserc.json
      # overrides the `publish` lifecycle to exclude
      # `semantic-release-cargo`, and CARGO_REGISTRY_TOKEN is omitted
      # from env as defense-in-depth. Re-enable by removing the
      # top-level `publish` key in .releaserc.json and adding
      # `CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}` below.
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix-shell shell.nix --run 'just release'
