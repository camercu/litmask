[package]
name = "litmask-build"
description = "Build-script helper for the litmask crate; generates compile-time keys and writes litmask.config."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
base64ct = { version = "1", features = ["alloc"] }
blake3 = "1"
chacha20poly1305 = "0.10"
rand_chacha = "0.3"
rand_core = "0.6"
getrandom = "0.2"
toml = "0.8"

[lints]
workspace = true
