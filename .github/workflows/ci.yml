name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  canonical-gate:
    name: Canonical gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            # GitHub output names use underscores; tool names use hyphens.
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}
          components: clippy,rustfmt,llvm-tools
          targets: thumbv7m-none-eabi,x86_64-pc-windows-gnu,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }},cargo-deny@${{ steps.tools.outputs.cargo_deny }},cargo-machete@${{ steps.tools.outputs.cargo_machete }},cargo-nextest@${{ steps.tools.outputs.cargo_nextest }},typos-cli@${{ steps.tools.outputs.typos_cli }},taplo-cli@${{ steps.tools.outputs.taplo_cli }},cargo-llvm-cov@${{ steps.tools.outputs.cargo_llvm_cov }}

      # `just lint` shells out to markdownlint-cli2, an npm tool the
      # cargo-centric install-action above can't provide. Locally it
      # comes from nix-shell; here npm -g, pinned via .tool-versions.
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@${{ steps.tools.outputs.markdownlint_cli2 }}

      # actionlint is a Go binary, not a cargo crate, so install-action
      # can't provide it. Pull the pinned release tarball straight from
      # GitHub (version from .tool-versions) onto PATH.
      - name: Install actionlint
        run: |
          ver=${{ steps.tools.outputs.actionlint }}
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" actionlint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint

      - name: Test (unit)
        run: just test-unit

      - name: Test (doc)
        run: just test-doc

      - name: Test (no default features)
        run: just test-no-default

      - name: Test (aes-gcm)
        run: just test-aes-gcm

      - name: Test (examples)
        run: just test-examples

      - name: Build
        run: just build

      - name: Check (no default features)
        run: just check-no-default

      - name: Check (no_std)
        run: just check-no-std

      - name: Check (cross)
        run: just check-cross

      - name: Doc
        run: just doc

      - name: Coverage
        run: just ci-coverage

  stable-advisory:
    # Latest-stable rustc / clippy run against the workspace. Failures
    # block merges so toolchain drift surfaces immediately — there is
    # no silent "this is OK because it's just an advisory" path. When
    # stable rustc tightens diagnostics or lints, the bump becomes a
    # forcing function for updating `.tool-versions` + snapshots.
    name: Latest stable advisory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest

      - name: just ci-stable
        run: just ci-stable

  semver-check:
    # Pre-1.0: no crates.io baseline exists, so this job will fail
    # until the first publish. continue-on-error keeps it advisory.
    name: Semver check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }},cargo-semver-checks@${{ steps.tools.outputs.cargo_semver_checks }}

      - name: just semver-check
        run: just semver-check

  mutants-diff:
    # Diff-scoped mutation testing: mutates only the lines a PR changes
    # and checks the suite still goes red, catching new tests too weak to
    # notice a bug (an efficacy gap coverage can't see). Split trust
    # levels: harness *health* (`mutants-verify` — the config hasn't
    # rotted into excluding everything) is a required step, while
    # *survivors* are advisory (step-level continue-on-error) because
    # mutation can surface equivalent mutants that aren't real gaps. A
    # dead harness must never look green. PR-only — needs a base ref.
    name: Mutation (diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }},cargo-nextest@${{ steps.tools.outputs.cargo_nextest }},cargo-mutants@${{ steps.tools.outputs.cargo_mutants }}

      # Required: config integrity (fail-closed guard).
      - name: just mutants-verify
        run: just mutants-verify

      # Advisory: surviving mutants on the changed lines.
      - name: just mutants-diff
        continue-on-error: true
        run: just mutants-diff "origin/${{ github.base_ref }}"

  fuzz:
    name: Fuzz (10s budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Fuzz parse_format_template
        run: cd litmask && cargo +nightly fuzz run parse_format_template --target x86_64-unknown-linux-gnu -- -max_total_time=10

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: litmask/fuzz/artifacts/

  # Verifies the docs/DEPLOYMENT.md nightly hardening recipe still
  # strips dependency / litmask source-path strings from `.rodata`.
  # Advisory: the flags are nightly-only and not part of the stable
  # canonical gate, so a nightly regression here informs without
  # blocking releases.
  nightly-scrub:
    name: Nightly dependency-fingerprint scrub
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Scrub hardened build
        run: ./scripts/scrub-hardened.sh

  # ── Platform smoke tests ──────────────────────────────────

  smoke-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    name: smoke (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v7

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p litmask-cli

      - name: Smoke test
        run: sh scripts/platform-smoke.sh target/debug/litmask

  smoke-almalinux:
    runs-on: ubuntu-latest
    name: smoke (almalinux)
    container: almalinux:9
    # Pin cargo/rustup homes: in a container job $HOME is unreliable, so
    # rustup's generated `.cargo/env` may not be where later steps look.
    env:
      CARGO_HOME: /usr/local/cargo
      RUSTUP_HOME: /usr/local/rustup
    steps:
      - name: Install dependencies
        run: dnf install -y gcc make git

      - uses: actions/checkout@v7

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --no-modify-path
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build -p litmask-cli

      # The almalinux:9 image ships an empty /etc/machine-id and no dbus
      # machine-id; systemd-machine-id-setup only runs at boot, not in a
      # container. So machine_uid reads an empty, unprovisioned id
      # (machine-id(5)) — no usable machine factor, EX_UNAVAILABLE (69),
      # same as stock OpenBSD: assert that failure path.
      - name: Smoke test
        run: sh scripts/platform-smoke.sh target/debug/litmask --expect-unavailable

  smoke-windows:
    name: smoke (windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build workspace
        run: cargo build --workspace

      - name: Test CLI
        run: cargo test -p litmask-cli

      - name: Smoke test
        run: sh scripts/platform-smoke.sh target/debug/litmask.exe

  smoke-bsd:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: freebsd
            version: '14.2'
            smoke_flags: ''
          - name: openbsd
            version: '7.8'
            smoke_flags: '--expect-unavailable'
    runs-on: ubuntu-latest
    name: smoke (${{ matrix.os.name }})
    steps:
      - uses: actions/checkout@v7
      - uses: cross-platform-actions/action@v1
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          shell: sh
          run: |
            set -eu

            case "$(uname)" in
              OpenBSD)
                # pkg_add has no built-in mirror retry; a truncated
                # download (transient mirror flake) aborts the whole
                # install and records a partial-rust-* package. Retry a
                # few times, clearing any partial between attempts —
                # parallel to the curl --retry on the other branch.
                n=0
                until sudo pkg_add rust; do
                  n=$((n + 1))
                  if [ "$n" -ge 3 ]; then
                    echo "pkg_add rust failed after $n attempts" >&2
                    exit 1
                  fi
                  sudo pkg_delete -q 'partial-rust-*' 2>/dev/null || true
                  sleep 5
                done
                ;;
              *)
                curl --proto '=https' --tlsv1.2 -sSf --retry 3 --retry-delay 5 \
                  https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                . "$HOME/.cargo/env"
                ;;
            esac

            cargo build -p litmask-cli

            # One line, no `\` continuations: cross-platform-actions feeds
            # this block to the VM such that a trailing continuation before
            # an empty smoke_flags value (freebsd) leaks the literal `\` as
            # an argument. Kept flat so the empty case passes no stray arg.
            sh scripts/platform-smoke.sh target/debug/litmask ${{ matrix.os.smoke_flags }}

  commitlint:
    # Runs on both pull_request and push so direct-to-main commits
    # are linted too. Branch protection may permit direct pushes;
    # this job ensures Conventional Commits regardless of merge path.
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Lint commits against Conventional Commits
        env:
          # `github.event.before` is all-zeroes on the first push to a
          # new branch, and is orphaned (unreachable in the fetched
          # history) after a force-push. In either case fall back to
          # linting just the single most-recent commit via `--last`.
          PR_BASE: origin/${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx --no-install commitlint --from "$PR_BASE" --to HEAD --verbose
          elif [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ] \
              || ! git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            npx --no-install commitlint --last --verbose
          else
            npx --no-install commitlint --from "$PUSH_BEFORE" --to "$PUSH_AFTER" --verbose
          fi
