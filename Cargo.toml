[workspace]
resolver = "2"
members = [
  "litmask",
  "litmask-build",
  "litmask-cli",
  "litmask-internal",
  "litmask-macros",
]

[workspace.package]
version = "0.1.2"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
repository = "https://github.com/camercu/litmask"

# Centralized version + path for every inter-workspace dependency.
# Member crates use `dep.workspace = true` to inherit both fields. A
# single version requirement lives here (rather than per-crate `=X.Y.Z`
# pins) so `cargo set-version --workspace` during a semantic-release
# run has one place to update and inter-crate cargo resolution never
# falls out of sync with `[workspace.package].version` after a bump.
[workspace.dependencies]
litmask-internal = { path = "litmask-internal", version = "0.1.2" }
litmask-macros = { path = "litmask-macros", version = "0.1.2" }
litmask-build = { path = "litmask-build", version = "0.1.2" }

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

# Recommended deployment profile for litmask consumers. Strips symbols
# and debug info so type names and other identifiable strings don't
# leak into the compiled artifact. The dirty-word scrub integration
# test exercises this profile to verify the library does not contribute
# litmask-identifying plaintext under recommended settings.
[profile.release]
strip = "symbols"
debug = false
panic = "abort"
lto = true
