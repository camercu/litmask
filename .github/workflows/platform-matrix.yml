name: Platform matrix

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Native runner jobs ──────────────────────────────────────

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    name: smoke (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --example hello_world
          cargo build -p litmask-cli

      - name: Smoke test
        run: |
          sh scripts/platform-smoke.sh \
            target/debug/examples/hello_world \
            target/debug/litmask.config \
            target/debug/litmask

  almalinux:
    runs-on: ubuntu-latest
    name: smoke (almalinux)
    container: almalinux:9
    steps:
      - name: Install dependencies
        run: dnf install -y gcc make git

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build --example hello_world
          cargo build -p litmask-cli

      - name: Smoke test
        run: |
          . "$HOME/.cargo/env"
          sh scripts/platform-smoke.sh \
            target/debug/examples/hello_world \
            target/debug/litmask.config \
            target/debug/litmask

  windows:
    runs-on: windows-latest
    name: smoke (windows)
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --example hello_world
          cargo build -p litmask-cli

      - name: Smoke test
        run: |
          sh scripts/platform-smoke.sh \
            target/debug/examples/hello_world.exe \
            target/debug/litmask.config \
            target/debug/litmask.exe

  # ── VM-based jobs ───────────────────────────────────────────

  freebsd:
    runs-on: ubuntu-latest
    name: smoke (freebsd)
    steps:
      - uses: actions/checkout@v6
      - uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: '14.2'
          shell: sh
          run: |
            set -eu
            curl --proto '=https' --tlsv1.2 -sSf --retry 3 --retry-delay 5 \
              https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"

            cargo build --example hello_world
            cargo build -p litmask-cli

            sh scripts/platform-smoke.sh \
              target/debug/examples/hello_world \
              target/debug/litmask.config \
              target/debug/litmask

  openbsd:
    runs-on: ubuntu-latest
    name: smoke (openbsd)
    steps:
      - uses: actions/checkout@v6
      - uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: openbsd
          version: '7.8'
          shell: sh
          run: |
            set -eu
            sudo pkg_add rust

            cargo build --example hello_world
            cargo build -p litmask-cli

            sh scripts/platform-smoke.sh \
              target/debug/examples/hello_world \
              target/debug/litmask.config \
              target/debug/litmask \
              --expect-unavailable
