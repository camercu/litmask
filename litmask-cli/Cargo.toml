[package]
name = "litmask-cli"
description = "Command-line companion to the litmask crate; provides bind and inspect subcommands."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true
include = ["src/**/*"]

# §1.5.1 amendment: the CLI is the deliberate exception to the
# single-cipher rule and is expected to link both cipher backends so
# `inspect` / `bind` (Tasks 24–26) can operate on wrappers from
# either cipher. Pulling both ciphers in directly here would trigger
# Cargo's workspace feature unification: litmask-internal would end
# up with both features in the target context, the runtime crate's
# CURRENT_CIPHER would flip to aes-gcm, and the host-context proc-
# macro (chacha-only) would no longer match. That ships a binary
# whose mask!() blobs are unrecoverable.
#
# Defer the dual-cipher dispatch to Task 24/25 where the CLI will
# pull `chacha20poly1305` and `aes-gcm` crates directly (without
# routing through litmask-internal's cipher dispatch). For Task 18
# the CLI is still a stub that exits 70.
[dependencies]
# The CLI's wire-format constants + base64url codec come from
# `litmask-internal`. The cipher dispatch (§2.9.1.6 amendment)
# lives in the CLI itself via direct dependencies on the AEAD
# crates so Cargo's workspace feature unification cannot flip the
# runtime crate's cipher choice — see the long-form rationale in
# the §1.5.1 amendment and the deferred-AC notes in Task 18.
litmask-internal = { workspace = true, features = ["chacha20-poly1305"] }
# Direct AEAD deps: the CLI links BOTH ciphers and dispatches on
# the wrapper's cipher-id byte at runtime (§2.9.1.6, §1.5.1
# amendment). Going through `litmask-internal`'s feature-gated
# dispatch would propagate `aes-gcm` to the runtime crate via
# workspace unification, which would flip its `CURRENT_CIPHER`
# and break the proc-macro/runtime cipher alignment.
aes-gcm = { version = "0.10", default-features = false, features = [
  "alloc",
  "aes",
] }
chacha20poly1305 = { version = "0.10", default-features = false, features = [
  "alloc",
] }
blake3 = { version = "1", default-features = false }
# `derive` enables the `#[derive(Parser)]` macro that drives the
# CLI's argument schema. `clap` is the de-facto Rust CLI parser
# (used by cargo itself); pulling it in eliminates the hand-rolled
# parser's edge cases (--help, --version, --flag=value, GNU-typical
# ordering) without reinventing them.
clap = { version = "4", features = ["derive"] }
machine-uid = "0.6"
zeroize = { version = "1", features = ["alloc"] }
# Pinned to an exact version (no caret) so config-parsing behavior
# cannot drift from a transitive update. The toml crate has shifted
# defaults at minor-version boundaries historically; the CLI's
# `inspect` and `bind` flows depend on a stable parse for
# `litmask.config`, so we lock to a known-good version. Bump
# deliberately when validating the new behavior.
toml = "=1.1.2"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "litmask-cli"
path = "src/main.rs"

[lints]
workspace = true
