# typos configuration. Run via `just lint-typos`.
# Reference: https://github.com/crate-ci/typos

[default]
# Auto-generated CHANGELOG.md commit links embed git SHAs whose hex
# can read as misspellings (e.g. `c159afe` → `safe`). Ignore the whole
# `[short](.../commit/long)` link span so semantic-release's changelog
# regeneration never re-trips the typos lint on a hash.
extend-ignore-re = ['\[[0-9a-f]{7,}\]\(https?://[^)]*?/commit/[0-9a-f]+\)']

[default.extend-words]
# `vermillion` appears verbatim as a historical commit subject quoted
# in the auto-generated CHANGELOG.md (the rename `vermillion →
# vermilion` documented in 88270cd). Allowlist the word so semantic-
# release's changelog regeneration on each release doesn't re-trip
# the typos lint. Real `vermillion` typos in source code remain
# unguarded — the trade-off is acceptable: the word is rare and any
# new source-side occurrence would be intentional.
vermillion = "vermillion"

[files]
# docs/BENCHMARKS.md is generated by scripts/gen-benchmarks.sh; it embeds
# a git short-SHA (whose hex can read as a typo, e.g. `358cace` → `cache`)
# plus verbatim divan/hyperfine output. Its prose originates in the
# generator, which is itself spell-checked, so linting the derived copy is
# redundant and only trips on the hash.
extend-exclude = [
  "target/",
  "node_modules/",
  "Cargo.lock",
  "package-lock.json",
  "docs/BENCHMARKS.md",
  "benches/build-fixtures/",
]
