# Markdown lint config (markdownlint-cli2). MD013/line-length is
# disabled: it fights reference tables and fenced code, which can't be
# hard-wrapped at a column. The remaining rules enforce structure —
# heading increments, single H1, fenced-code languages, no bare URLs.
config:
  MD013: false
  # Tables use `| cell |` spacing; pin the style so the "consistent"
  # default can't be poisoned by a single compact table elsewhere.
  MD060:
    style: "leading_and_trailing"
  # Repeated subsection names (e.g. "Acceptance Criteria" per task,
  # "Build setup" per migration path) are valid under distinct parents;
  # only forbid duplicates among direct siblings.
  MD024:
    siblings_only: true
  # Pin emphasis styles repo-wide so they're consistent across files,
  # not only within each file (the "consistent" default lets one file
  # use `_x_` and another `*x*`). Italic = underscore (matches the
  # pervasive `_Avoid_` convention in CONTEXT.md); bold = asterisk
  # (matches the universal `**term**`).
  MD049:
    style: underscore
  MD050:
    style: asterisk
globs:
  - "**/*.md"
ignores:
  - node_modules
  - target
  - CHANGELOG.md
  # Local Claude Code config and installed skills — agent tooling, not
  # project docs, and often third-party Markdown that won't conform.
  - .claude
