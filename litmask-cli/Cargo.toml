[package]
name = "litmask-cli"
description = "Command-line companion to the litmask crate; provides bind and inspect subcommands."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true
include = ["src/**/*"]

# §1.5.1 amendment: the CLI is the deliberate exception to the
# single-cipher rule and is expected to link both cipher backends so
# `inspect` / `bind` (Tasks 24–26) can operate on wrappers from
# either cipher. Pulling both ciphers in directly here would trigger
# Cargo's workspace feature unification: litmask-internal would end
# up with both features in the target context, the runtime crate's
# CURRENT_CIPHER would flip to aes-gcm, and the host-context proc-
# macro (chacha-only) would no longer match. That ships a binary
# whose mask!() blobs are unrecoverable.
#
# Defer the dual-cipher dispatch to Task 24/25 where the CLI will
# pull `chacha20poly1305` and `aes-gcm` crates directly (without
# routing through litmask-internal's cipher dispatch). For Task 18
# the CLI is still a stub that exits 70.
[dependencies]
litmask-internal.workspace = true

[[bin]]
name = "litmask-cli"
path = "src/main.rs"

[lints]
workspace = true
