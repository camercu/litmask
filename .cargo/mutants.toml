# cargo-mutants configuration — tuned so the mutation CI lane
# (`just mutants-diff`, the "Mutation (diff)" job) is trustworthy signal,
# not flaky noise.
#
# Why this lane does not produce flaky / false-positive failures:
#
#   1. Deterministic. Mutation is not stochastic — the same source + tests
#      always yield the same caught/survived verdict for a given mutant.
#
#   2. Baseline-first (cargo-mutants default `--baseline run`): the
#      unmutated tree is tested before any mutant. A flaky, slow, or broken
#      suite fails that baseline, so the job reports "baseline failed" (a
#      test-health signal) having tested ZERO mutants. A flaky test can
#      never masquerade as a surviving mutant.
#
#   3. Generous timeouts (below): a mutant is only timed out on a genuine
#      hang, never because a runner was briefly slow — so a mutant cannot
#      flip between caught (timeout) and survived across runs.
#
#   4. Diff-scoped in CI (`--in-diff`): only the lines a PR changes are
#      mutated, so an equivalent mutant already in the tree never
#      re-surfaces; new noise is bounded to newly-changed code.
#
# Two classes of true "false positive" survive no matter the tests, so
# neither is a gap:
#
#   a. Equivalent mutants — a mutation that cannot change observable
#      behaviour, so no test can kill it (e.g. `x % 8` -> `x + 8` where a
#      following `u8::rotate_left` already reduces mod 8).
#   b. Build-script-only effects — `litmask-build::emit` runs solely as a
#      consumer's `build.rs`; no *test* (even at `test_workspace = true`)
#      invokes it, only a real downstream BUILD does, so its stub survives
#      the whole test suite. `test_workspace` fixes the cross-crate *test*
#      blind spot (proc-macro output observed by a consumer's tests); it
#      does not run build scripts.
#
# Triage each ONCE: a real gap gets a test; a class-(a)/(b) mutant is
# recorded in `exclude_re` below with its reason. After triage every
# remaining survivor is a real, actionable gap — that is what earns the
# lane trust.
#
# `exclude_re` over `#[mutants::skip]`, deliberately: the attribute must
# resolve at compile time, which would add the `mutants` proc-macro crate
# as a dependency of the published crates — not worth it for a
# security-focused, dependency-minimal workspace. The cost is that these
# regexes can rot (go stale after a rename, or over-match — an unescaped
# `||` once matched EVERY mutant and silently disabled the whole suite);
# `just mutants-verify` bounds each entry to 1..=8 matches and runs
# before every `mutants-diff`, so that class of rot fails loudly.

# Build the test targets only — never examples. `--tests` is a cargo
# *target selector* (it precedes `--`), so unlike test-harness filters it
# stops the tier-gated examples from being *compiled* at all: no single
# feature/env config compiles every `init!` form (see `exclude_globs`
# note below), so a `--all-features` example build cannot pass — it would
# break the unmutated baseline before a single mutant is tested. `--tests`
# already covers lib, bin, and integration unit tests, and (unlike an
# explicit `--lib`) does not error on a bin-only crate such as
# `litmask-cli` that has no library target.
additional_cargo_args = ["--tests"]

# Run the WHOLE workspace's tests for every mutant, not just the mutated
# crate's own tests (cargo-mutants' package-scoped default). Required for
# trustworthy signal: `litmask-macros` is a proc-macro crate whose output
# is only observable once a CONSUMER crate compiles the expansion, so its
# behavior-changing mutants are killed only by the `litmask` crate's
# integration tests (`tests/mask_all*.rs`) and trybuild compile-fail tests
# (`tests/compile/*_strict_*.rs`) — never by litmask-macros' own unit
# tests. Under the package-scoped default those mutants (e.g. stubbing
# `mask_all::expand` to an empty `TokenStream`, or deleting the `strict`
# field) SURVIVE as false gaps even though `just ci` catches the same
# regression as a compile error. With the lane fail-closed, that would
# fail CI on a PR touching those lines. `true` closes the blind spot.
test_workspace = true

# Anti-flake timeouts. The suite runs in well under a second, so the
# auto-derived timeout would be tiny and a momentarily-slow runner could
# straddle it. Floor and widen it: only a true hang trips these.
minimum_test_timeout = 120
timeout_multiplier = 5.0

# Mutate real library/bin logic only. Examples are seal-tier-gated (no
# single env config compiles every `init!` form), benches are a separate
# throwaway workspace, and `test_util.rs` is test scaffolding (its wire
# builders are exercised by every downstream round-trip test) — mutating
# any of them is noise, not signal.
exclude_globs = ["litmask/examples/**", "benches/**", "**/test_util.rs"]

# Provably-equivalent mutants, each with a one-line reason, so the
# suppression list is auditable and every non-excluded survivor stays a
# real gap.
exclude_re = [
  # `FormatVersion` has only the `V1 = 0x01` variant, so `to_byte`
  # (`self as u8`) is `1` for the sole input — the mutant is identical
  # output, not a test gap. Remove this when a second variant lands.
  "replace FormatVersion::to_byte -> u8 with 1",
  # `emit` is the build.rs entry point — pure orchestration (an imperative
  # shell) that reads env, writes `OUT_DIR` artifacts, and emits rustc
  # directives. Its effect is only observable through a full consumer build,
  # not litmask-build's own unit tests; the units it delegates to (Profile,
  # profile_dir_of, KDF, seal) are mutation-covered directly. Stubbing it to
  # `()` is caught by every downstream build, not this crate's suite.
  "replace emit with \\(\\)",
  # `Drop for BuildArtifacts` zeroizes key material on drop. Scrubbed memory
  # is not observable from a passing test, so no test can kill the stub —
  # an equivalent mutant, not a gap.
  "replace <impl Drop for BuildArtifacts>::drop with \\(\\)",
  # `reset_mask_key_cache` (the `test_util` shim and its crate-internal
  # delegate) is test/bench-only scaffolding that forwards to
  # `mask_key_store::clear`. That underlying behaviour — clearing drops the
  # entries so the next `get_or_init` re-derives — is directly asserted by
  # `mask_key_store::tests::clear_drops_cached_entries_so_next_get_reinits`;
  # the wrappers add no logic to test, so stubbing them to `()` is caught
  # nowhere. Testing the bare delegation would be a trivial tautology.
  "replace (?:test_util::)?reset_mask_key_cache with \\(\\)",
  # The `!=` guarding the no_std single-cell second-masking-crate diagnostic
  # lives in `#[cfg(not(feature = \"std\"))]`, so it is dead code under the
  # `--all-features` mutation lane (which selects `std`): the mutant compiles
  # to an identical binary and cannot be killed here. It guards a debug-only
  # diagnostic; a real check needs a dedicated no_std mutation lane, not this
  # std one.
  "replace != with == in get_or_init",
  # `peek(Ident) && peek2(!)` routes a `mask_concat!` argument to the
  # macro-branch vs the literal-branch. Flipping to `||` is equivalent:
  # both branches reject every input the other would (a non-`ident!`,
  # non-literal token), and `syn::parse2`'s full-consumption requirement
  # collapses the only difference to unobservable error text/span — no
  # input distinguishes them by parse success or resolved value.
  "replace && with \\|\\| in <impl Parse for MaskConcatArg>::parse",
  # `current_skip_reason`'s pattern-position branch governs a maskable
  # string *expression* seen while `pattern_depth > 0`. Pattern literals are
  # `Pat::Lit`, recorded directly by `visit_pat_mut`, and no valid
  # pattern-position expression carries a maskable string literal or a
  # rewritable macro (a string range bound is not valid Rust), so the
  # branch's threshold is never observed — the mutant is equivalent.
  "replace > with < in MaskAllWalker::current_skip_reason",
  # Stubbing `visit_expr_macro_mut` only stops `skip_macro_depth` from being
  # bumped-then-restored; the counter still ends at zero, and the elided
  # `visit_mut::visit_expr_macro_mut` recursion only descends into the macro
  # *path* (no maskable node). syn never walks a macro's token stream, so no
  # literal is ever visited while the counter is non-zero — nothing observes
  # the difference. Equivalent. (The depth *balance* itself is covered by
  # `skip_macro_expression_restores_depth_for_the_following_literal`.)
  "replace <impl VisitMut for MaskAllWalker>::visit_expr_macro_mut with \\(\\)",
]
