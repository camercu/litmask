[workspace]
resolver = "2"
members = [
    "litmask",
    "litmask-build",
    "litmask-cli",
    "litmask-internal-format",
    "litmask-macros",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
repository = "https://github.com/camercu/litmask"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

# Recommended deployment profile for litmask consumers. Strips symbols
# and debug info so type names and other identifiable strings don't
# leak into the compiled artifact. The dirty-word scrub integration
# test exercises this profile to verify the library does not contribute
# litmask-identifying plaintext under recommended settings.
[profile.release]
strip = "symbols"
debug = false
panic = "abort"
lto = true
